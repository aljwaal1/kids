name: Build Installable Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Build installable debug APK
        run: flutter build apk --debug

      - name: Prepare APK
        run: |
          mkdir -p final-apk
          cp build/app/outputs/flutter-apk/app-debug.apk final-apk/tofli_alawal_install.apk
          ls -lh final-apk/tofli_alawal_install.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tofli-alawal-install-apk
          path: final-apk/tofli_alawal_install.apk
